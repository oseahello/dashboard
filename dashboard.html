<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nocturno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-overlay: rgba(15, 23, 42, 0.85); /* Oscurece la imagen de fondo */
            --card-bg: rgba(30, 41, 59, 0.7);    /* Tarjetas semi-transparentes */
            --text-main: #ffffff;               /* Blanco para lectura clara */
            --accent: #38bdf8;                  /* El azul que te gustó */
            --green: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-main);
            /* Fondo de imagen aleatoria de paisajes oscuros */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://source.unsplash.com/featured/1920x1080/?night,landscape,dark,forest') no-repeat center center fixed;
            background-size: cover;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 20px; 
            backdrop-filter: blur(8px); /* Efecto vidrio esmerilado */
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); /* Sombra para legibilidad */
        }

        .clock { font-size: 3.5rem; font-weight: 700; text-align: center; color: var(--accent); }
        h2 { font-size: 1rem; margin-top: 0; border-bottom: 1px solid var(--accent); padding-bottom: 8px; text-transform: uppercase; color: var(--accent); }

        /* Dólar con colores suaves */
        .dolar-container { display: flex; justify-content: space-around; text-align: center; margin-top: 10px; }
        .dolar-price { font-size: 1.6rem; font-weight: bold; color: var(--green); }
        .label { font-size: 0.75rem; color: var(--text-main); opacity: 0.9; }

        /* Contenido de texto */
        .content { font-size: 0.95rem; line-height: 1.5; color: var(--text-main); }
        a { color: var(--accent); text-decoration: none; font-weight: 500; }
        
        #news-container { max-height: 250px; overflow-y: auto; }
        .news-item { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

        /* Estilo para el Clima */
        .weather-box { grid-column: span 2; min-height: 250px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="clock" id="clock">00:00:00</div>
        <div id="date" style="text-align: center; font-weight: 300;">Cargando fecha...</div>
    </div>

    <div class="card">
        <h2>Dólar Argentina</h2>
        <div class="dolar-container">
            <div><div class="label">OFICIAL</div><div class="dolar-price" id="dolar-oficial">...</div></div>
            <div><div class="label">BLUE</div><div class="dolar-price" id="dolar-blue">...</div></div>
        </div>
    </div>

    <div class="card">
        <h2>Palabra del Día</h2>
        <div class="content">
            <span id="word-today" style="font-size: 1.3rem; color: var(--accent); font-weight: bold;">...</span>
            <p id="word-def"></p>
        </div>
    </div>

    <div class="card weather-box">
        <h2>Pronóstico Extendido</h2>
        <a class="weatherwidget-io" href="https://forecast7.com/es/n34d60s58d38/buenos-aires/" data-label_1="BUENOS AIRES" data-theme="pure" data-basecolor="" data-accent="" data-textcolor="#ffffff" data-days="7">CLIMA</a>
    </div>

    <div class="card">
        <h2>Recomendación Literaria</h2>
        <div id="book-content" class="content">Cargando...</div>
    </div>

    <div class="card">
        <h2>Tendencias Cine</h2>
        <div id="movie-content" class="content">Cargando...</div>
    </div>

    <div class="card" style="grid-column: span 1;">
        <h2>Noticias</h2>
        <div id="news-container" class="content">...</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-AR');
            document.getElementById('date').textContent = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000); updateClock();

        async function fetchDolar() {
            try {
                const resO = await fetch('https://dolarapi.com/v1/dolares/oficial');
                const resB = await fetch('https://dolarapi.com/v1/dolares/blue');
                const o = await resO.json(); const b = await resB.json();
                document.getElementById('dolar-oficial').textContent = `$${o.venta}`;
                document.getElementById('dolar-blue').textContent = `$${b.venta}`;
            } catch (e) { console.error(e); }
        }
        fetchDolar();

        async function fetchWord() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.wordreference.com/wotd/wotdes.xml`);
                const data = await res.json();
                document.getElementById('word-today').textContent = data.items[0].title;
                document.getElementById('word-def').innerHTML = data.items[0].description.split('<br>')[0];
            } catch (e) { document.getElementById('word-today').textContent = "Resiliencia"; }
        }
        fetchWord();

        async function fetchBooks() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.goodreads.com/quotes_of_the_day/rss`);
                const data = await res.json();
                document.getElementById('book-content').innerHTML = `<i>"${data.items[0].title}"</i><br><small>${data.items[0].description}</small>`;
            } catch (e) { }
        }
        fetchBooks();

        async function fetchMovies() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.fotogramas.es/rss/all.xml`);
                const data = await res.json();
                document.getElementById('movie-content').innerHTML = data.items.slice(0, 2).map(i => `<p>• ${i.title}</p>`).join('');
            } catch (e) { }
        }
        fetchMovies();

        async function fetchNews() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419`);
                const data = await res.json();
                document.getElementById('news-container').innerHTML = data.items.slice(0, 5).map(i => `<div class="news-item"><a href="${i.link}" target="_blank">${i.title}</a></div>`).join('');
            } catch (e) { }
        }
        fetchNews();

        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
    </script>
</body>
</html>
