<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeDash Personal</title>
    <link href="https://fonts.googleapis.com/css2?family=Verdana:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.85);
            --accent: #38bdf8;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --border-color: rgba(56, 189, 248, 0.3);
        }

        body {
            font-family: Verdana, Arial, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-primary);
            background-color: #0d1117;
            background-image: none;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0;
            padding: 10px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            width: 100%;
        }

        /* Sección Reloj */
        .clock-section {
            text-align: center;
            padding: 15px 12px;
        }

        .date {
            color: var(--accent);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .clock {
            font-size: 32px;
            font-weight: bold;
            color: var(--text-primary);
            margin: 5px 0;
            font-family: 'Courier New', monospace;
        }

        h2 {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        /* Finanzas */
        .finance-row {
            display: inline-block;
            width: 48%;
            vertical-align: top;
            margin-bottom: 10px;
        }

        .dolar-label {
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: bold;
            margin-bottom: 3px;
        }

        .dolar-val {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        /* Clima */
        .weather-box {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .weather-temp {
            font-size: 26px;
            font-weight: bold;
            color: var(--accent);
            margin: 5px 0;
        }

        .weather-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 3px 0;
        }

        .weather-location {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        /* Quote */
        .quote-section {
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.4);
        }

        .quote-text {
            font-size: 12px;
            font-weight: normal;
            color: var(--text-primary);
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .quote-author {
            font-size: 11px;
            color: var(--accent);
            text-align: right;
        }

        /* Media */
        .media-section {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .media-grid {
            display: inline-block;
            width: 100%;
        }

        .media-card {
            display: inline-block;
            width: 48%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 6px;
            margin-right: 2%;
            margin-bottom: 8px;
            vertical-align: top;
            overflow: hidden;
        }

        .media-card:nth-child(even) {
            margin-right: 0;
        }

        .media-poster {
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .media-info {
            padding: 8px;
        }

        .media-title {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .media-meta {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .media-rating {
            color: #fbbf24;
            font-weight: bold;
        }

        /* Botones */
        .refresh-btn {
            background: rgba(56, 189, 248, 0.3);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 8px;
            font-family: Arial, sans-serif;
        }

        .refresh-btn:hover {
            background: rgba(56, 189, 248, 0.5);
        }

        /* Noticias */
        .news-link {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 11px;
            border-left: 3px solid var(--accent);
        }

        .news-link:hover {
            background: rgba(56, 189, 248, 0.2);
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 4px;
        }

        .button-row {
            display: inline-block;
        }

        @media (max-width: 640px) {
            body {
                font-size: 12px;
                padding: 5px;
            }
            .card {
                padding: 10px;
                margin-bottom: 8px;
            }
            .clock {
                font-size: 28px;
            }
            .weather-temp {
                font-size: 22px;
            }
            .media-card {
                width: 100%;
                margin-right: 0;
                margin-bottom: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="card clock-section">
            <div class="date" id="date">--</div>
            <div class="clock" id="clock">00:00:00</div>
        </div>

        <div class="card">
            <h2><span class="status-dot"></span>Mercado Financiero</h2>
            <div class="finance-row">
                <div class="dolar-label">BLUE VENTA</div>
                <div class="dolar-val" id="blue-val">...</div>
            </div>
            <div class="finance-row" style="text-align: right;">
                <div class="dolar-label">OFICIAL</div>
                <div class="dolar-val" id="oficial-val">...</div>
            </div>
        </div>

        <div class="card">
            <h2>
                Clima Actual
                <button class="refresh-btn" onclick="fetchWeather()">↻</button>
            </h2>
            <div class="weather-box">
                <div class="weather-temp" id="weather-temp">--°</div>
                <div class="weather-desc" id="weather-desc">Cargando...</div>
                <div class="weather-location" id="weather-location">Buenos Aires</div>
            </div>
        </div>

        <div class="card quote-section">
            <h2>
                💡 Frase del Día
                <button class="refresh-btn" onclick="fetchQuote()">↻</button>
            </h2>
            <div class="quote-text" id="quote-text">Cargando frase inspiradora...</div>
            <div class="quote-author" id="quote-author">— Autor</div>
        </div>

        <div class="card media-section">
            <h2>
                🎬 Series y Películas
                <button class="refresh-btn" onclick="fetchMedia()">↻</button>
            </h2>
            <div class="media-grid" id="media-container">
                <div style="text-align: center; color: var(--text-secondary); font-size: 11px; padding: 20px;">Cargando recomendaciones...</div>
            </div>
        </div>

        <div class="card">
            <h2>📰 Titulares</h2>
            <div id="news-container" style="font-size: 11px;">Cargando noticias...</div>
        </div>

    </div>

    <script>
        // ==================== RELOJ ====================
        function updateTime() {
            const now = new Date();
            const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            
            const dayName = days[now.getDay()];
            const date = now.getDate();
            const monthName = months[now.getMonth()];
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = hours + ':' + minutes + ':' + seconds;
            document.getElementById('date').textContent = dayName + ' ' + date + ' de ' + monthName;
        }
        
        setInterval(updateTime, 1000);
        updateTime();

        // ==================== FINANZAS ====================
        function fetchFinance() {
            fetch('https://dolarapi.com/v1/dolares')
                .then(res => res.json())
                .then(data => {
                    const blue = data.find(d => d.casa === "blue");
                    const oficial = data.find(d => d.casa === "oficial");
                    
                    document.getElementById('blue-val').textContent = blue ? '$' + blue.venta : 'N/A';
                    document.getElementById('oficial-val').textContent = oficial ? '$' + oficial.venta : 'N/A';
                })
                .catch(e => { 
                    console.error("Error Finanzas:", e);
                });
        }
        fetchFinance();
        setInterval(fetchFinance, 300000);

        // ==================== CLIMA ====================
        function fetchWeather() {
            fetch('https://api.open-meteo.com/v1/forecast?latitude=-34.6037&longitude=-58.3816&current=temperature_2m,weather_code,is_day&timezone=America/Argentina/Buenos_Aires')
                .then(res => res.json())
                .then(data => {
                    const current = data.current;
                    document.getElementById('weather-temp').textContent = Math.round(current.temperature_2m) + '°';
                    document.getElementById('weather-desc').textContent = getWeatherDescription(current.weather_code, current.is_day);
                })
                .catch(e => { 
                    console.error("Error Clima:", e);
                    document.getElementById('weather-desc').textContent = 'Error al cargar';
                });
        }

        function getWeatherDescription(code, isDay) {
            const descriptions = {
                0: 'Despejado',
                1: 'Mayormente despejado',
                2: 'Nublado parcial',
                3: 'Nublado',
                45: 'Brumoso',
                48: 'Bruma helada',
                51: 'Llovizna ligera',
                53: 'Llovizna moderada',
                55: 'Llovizna densa',
                61: 'Lluvia débil',
                63: 'Lluvia moderada',
                65: 'Lluvia fuerte',
                71: 'Nieve débil',
                73: 'Nieve moderada',
                75: 'Nieve fuerte',
                80: 'Chubascos débiles',
                81: 'Chubascos moderados',
                82: 'Chubascos violentos',
                95: 'Tormenta',
                96: 'Tormenta con granizo'
            };
            return descriptions[code] || 'Clima desconocido';
        }

        fetchWeather();
        setInterval(fetchWeather, 600000);

        // ==================== FRASE DEL DÍA ====================
        function fetchQuote() {
            fetch('https://api.quotable.io/random?language=es')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('quote-text').textContent = '"' + data.content + '"';
                    document.getElementById('quote-author').textContent = '— ' + data.author;
                })
                .catch(e => {
                    console.error("Error Frase:", e);
                    const frases = [
                        { text: "La vida es lo que pasa mientras estás ocupado haciendo otros planes.", author: "John Lennon" },
                        { text: "El único modo de hacer un gran trabajo es amar lo que haces.", author: "Steve Jobs" },
                        { text: "La innovación distingue a un líder.", author: "Steve Jobs" }
                    ];
                    const random = frases[Math.floor(Math.random() * frases.length)];
                    document.getElementById('quote-text').textContent = '"' + random.text + '"';
                    document.getElementById('quote-author').textContent = '— ' + random.author;
                });
        }
        fetchQuote();
        setInterval(fetchQuote, 86400000);

        // ==================== SERIES Y PELÍCULAS ====================
        const mediaList = [
            { title: "Breaking Bad", rating: "9.5", type: "Serie", emoji: "🎬" },
            { title: "The Last of Us", rating: "8.8", type: "Serie", emoji: "🧟" },
            { title: "Inception", rating: "8.8", type: "Película", emoji: "💭" },
            { title: "The Crown", rating: "8.6", type: "Serie", emoji: "👑" },
            { title: "Dune", rating: "8.0", type: "Película", emoji: "🏜️" },
            { title: "Stranger Things", rating: "8.7", type: "Serie", emoji: "📡" }
        ];

        function shuffleArray(array) {
            const shuffled = array.slice();
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = shuffled[i];
                shuffled[i] = shuffled[j];
                shuffled[j] = temp;
            }
            return shuffled;
        }

        function fetchMedia() {
            const shuffled = shuffleArray(mediaList).slice(0, 4);
            let html = '';
            for (let i = 0; i < shuffled.length; i++) {
                const media = shuffled[i];
                html += '<div class="media-card">' +
                    '<div class="media-poster">' + media.emoji + '</div>' +
                    '<div class="media-info">' +
                    '<div class="media-title">' + media.title + '</div>' +
                    '<div class="media-meta"><span class="media-rating">⭐ ' + media.rating + '</span> • ' + media.type + '</div>' +
                    '</div></div>';
            }
            document.getElementById('media-container').innerHTML = html;
        }

        fetchMedia();
        setInterval(fetchMedia, 86400000);

        // ==================== NOTICIAS ====================
        function fetchNews() {
            fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.clarin.com/rss/lo-ultimo/')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    const items = data.items ? data.items.slice(0, 3) : [];
                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        html += '<a href="' + item.link + '" class="news-link" target="_blank">' + item.title + '</a>';
                    }
                    document.getElementById('news-container').innerHTML = html || 'No hay noticias disponibles';
                })
                .catch(e => { 
                    document.getElementById('news-container').textContent = "Error al cargar noticias";
                });
        }
        fetchNews();
    </script>
</body>
</html>
        }
        fetchNews();
    </script>
</body>
</html>
