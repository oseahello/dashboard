<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeDash Personal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.75); 
            --accent: #38bdf8; /* Azul Cian */
            --text-primary: #ffffff; /* Blanco puro para mejor lectura */
            --text-secondary: #cbd5e1; /* Gris claro azulado */
            --border-color: rgba(56, 189, 248, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-primary);
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        /* Sección Reloj */
        .clock-section { text-align: center; }
        .clock { font-size: 4rem; font-weight: 600; color: var(--text-primary); margin: 0; line-height: 1; }
        .date { color: var(--accent); text-transform: uppercase; font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; margin-bottom: 5px; }

        h2 { 
            font-size: 0.85rem; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
        }

        .dolar-val { font-size: 1.8rem; font-weight: 600; color: #fff; }
        .dolar-label { font-size: 0.75rem; color: var(--text-secondary); }

        .weather-container { grid-column: span 2; min-height: 150px; }
        
        .weather-box {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .weather-temp { font-size: 2.5rem; font-weight: 600; color: var(--accent); }
        .weather-desc { font-size: 0.9rem; color: var(--text-secondary); margin-top: 5px; }
        .weather-location { font-size: 0.8rem; color: var(--text-secondary); margin-top: 3px; }

        .quote-section {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(139, 92, 246, 0.15));
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .quote-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .quote-author {
            font-size: 0.85rem;
            color: var(--accent);
            text-align: right;
        }

        .refresh-btn {
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            margin-left: 10px;
        }

        .refresh-btn:hover {
            background: rgba(56, 189, 248, 0.4);
        }

        .news-link { 
            display: block; 
            color: var(--text-primary); 
            text-decoration: none; 
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .news-link:hover { background: rgba(56, 189, 248, 0.2); transform: translateX(5px); }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            .weather-container { grid-column: span 1; }
            .quote-section { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="card clock-section">
        <div class="date" id="date">--</div>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <div class="card">
        <h2><span class="status-dot"></span>Mercado Financiero</h2>
        <div style="display: flex; justify-content: space-between;">
            <div>
                <div class="dolar-label">BLUE VENTA</div>
                <div class="dolar-val" id="blue-val">...</div>
            </div>
            <div style="text-align: right;">
                <div class="dolar-label">OFICIAL</div>
                <div class="dolar-val" id="oficial-val">...</div>
            </div>
        </div>
    </div>

    <div class="card weather-container">
        <h2>
            Clima Actual
            <button class="refresh-btn" onclick="fetchWeather()">↻</button>
        </h2>
        <div class="weather-box">
            <div class="weather-temp" id="weather-temp">--°</div>
            <div class="weather-desc" id="weather-desc">Cargando...</div>
            <div class="weather-location" id="weather-location">Buenos Aires</div>
        </div>
    </div>

    <div class="card quote-section">
        <h2>
            💡 Frase del Día
            <button class="refresh-btn" onclick="fetchQuote()">↻</button>
        </h2>
        <div class="quote-text" id="quote-text">Cargando frase inspiradora...</div>
        <div class="quote-author" id="quote-author">— Autor</div>
    </div>

    <div class="card">
        <h2>Titulares</h2>
        <div id="news-container">Cargando noticias...</div>
    </div>

    <script>
        // ==================== RELOJ ====================
        function updateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', day: '2-digit', month: 'long' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-AR', optionsTime);
            document.getElementById('date').textContent = now.toLocaleDateString('es-AR', optionsDate);
        }
        
        setInterval(updateTime, 1000);
        updateTime();

        // ==================== FINANZAS ====================
        async function fetchFinance() {
            try {
                const res = await fetch('https://dolarapi.com/v1/dolares');
                const data = await res.json();
                const blue = data.find(d => d.casa === "blue");
                const oficial = data.find(d => d.casa === "oficial");
                
                document.getElementById('blue-val').textContent = blue ? `$${blue.venta}` : 'N/A';
                document.getElementById('oficial-val').textContent = oficial ? `$${oficial.venta}` : 'N/A';
            } catch (e) { 
                console.error("Error Finanzas:", e);
            }
        }
        fetchFinance();
        setInterval(fetchFinance, 300000); // Cada 5 min

        // ==================== CLIMA ====================
        async function fetchWeather() {
            try {
                // API de Open-Meteo (sin clave API necesaria)
                const response = await fetch(
                    'https://api.open-meteo.com/v1/forecast?latitude=-34.6037&longitude=-58.3816&current=temperature_2m,weather_code,is_day&timezone=America/Argentina/Buenos_Aires'
                );
                const data = await response.json();
                const current = data.current;
                
                document.getElementById('weather-temp').textContent = `${current.temperature_2m}°`;
                document.getElementById('weather-desc').textContent = getWeatherDescription(current.weather_code, current.is_day);
                
            } catch (e) { 
                console.error("Error Clima:", e);
                document.getElementById('weather-desc').textContent = 'Error al cargar clima';
            }
        }

        function getWeatherDescription(code, isDay) {
            const descriptions = {
                0: 'Cielo despejado',
                1: 'Principalmente despejado',
                2: 'Parcialmente nublado',
                3: 'Nublado',
                45: 'Brumoso',
                48: 'Bruma helada',
                51: 'Llovizna ligera',
                53: 'Llovizna moderada',
                55: 'Llovizna densa',
                61: 'Lluvia débil',
                63: 'Lluvia moderada',
                65: 'Lluvia fuerte',
                71: 'Nieve débil',
                73: 'Nieve moderada',
                75: 'Nieve fuerte',
                80: 'Chubascos débiles',
                81: 'Chubascos moderados',
                82: 'Chubascos violentos',
                95: 'Tormenta',
                96: 'Tormenta con granizo'
            };
            return descriptions[code] || 'Clima desconocido';
        }

        fetchWeather();
        setInterval(fetchWeather, 600000); // Cada 10 minutos

        // ==================== FRASE DEL DÍA ====================
        async function fetchQuote() {
            try {
                const res = await fetch('https://api.quotable.io/random?language=es');
                const data = await res.json();
                
                document.getElementById('quote-text').textContent = `"${data.content}"`;
                document.getElementById('quote-author').textContent = `— ${data.author}`;
            } catch (e) {
                console.error("Error Frase:", e);
                // Frases alternativas si falla la API
                const frases = [
                    { text: "La vida es lo que pasa mientras estás ocupado haciendo otros planes.", author: "John Lennon" },
                    { text: "El único modo de hacer un gran trabajo es amar lo que haces.", author: "Steve Jobs" },
                    { text: "La innovación distingue a un líder de un seguidor.", author: "Steve Jobs" },
                    { text: "La vida es 10% lo que te sucede y 90% cómo reaccionas ante ello.", author: "Charles R. Swindoll" },
                    { text: "No es la montaña la que debemos conquistar sino a nosotros mismos.", author: "Edmund Hillary" }
                ];
                const random = frases[Math.floor(Math.random() * frases.length)];
                document.getElementById('quote-text').textContent = `"${random.text}"`;
                document.getElementById('quote-author').textContent = `— ${random.author}`;
            }
        }
        fetchQuote();
        setInterval(fetchQuote, 86400000); // Cada 24 horas

        // ==================== NOTICIAS ====================
        async function fetchNews() {
            try {
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.clarin.com/rss/lo-ultimo/');
                const data = await res.json();
                document.getElementById('news-container').innerHTML = data.items.slice(0, 4).map(item => 
                    `<a href="${item.link}" class="news-link" target="_blank">${item.title}</a>`
                ).join('');
            } catch (e) { 
                document.getElementById('news-container').textContent = "Error al cargar noticias"; 
            }
        }
        fetchNews();
    </script>
</body>
</html>
