<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nocturno v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-overlay: rgba(10, 15, 25, 0.9);
            --card-bg: rgba(30, 41, 59, 0.5); 
            --text-main: #ffffff;
            --accent: #38bdf8;
            --green: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-main);
            /* Imagen de fondo nocturna fija y oscurecida */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 20px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .clock { font-size: 3.5rem; font-weight: 700; text-align: center; color: var(--accent); }
        h2 { font-size: 0.9rem; margin-top: 0; border-bottom: 1px solid var(--accent); padding-bottom: 8px; text-transform: uppercase; color: var(--accent); }
        
        .dolar-price { font-size: 1.6rem; font-weight: bold; color: var(--green); }
        .content { font-size: 0.9rem; line-height: 1.5; color: rgba(255,255,255,0.9); }
        
        a { color: var(--accent); text-decoration: none; }
        #news-list { list-style: none; padding: 0; margin: 0; }
        #news-list li { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }

        .weather-box { grid-column: span 2; min-height: 250px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="clock" id="clock">00:00:00</div>
        <div id="date" style="text-align: center; opacity: 0.8;">Cargando fecha...</div>
    </div>

    <div class="card">
        <h2>Dólar Argentina</h2>
        <div style="display: flex; justify-content: space-around; text-align: center; margin-top: 10px;">
            <div><div style="font-size: 0.7rem; opacity: 0.6;">OFICIAL</div><div class="dolar-price" id="dolar-oficial">...</div></div>
            <div><div style="font-size: 0.7rem; opacity: 0.6;">BLUE</div><div class="dolar-price" id="dolar-blue">...</div></div>
        </div>
    </div>

    <div class="card">
        <h2>Palabra del Día</h2>
        <div class="content" id="word-box">Cargando palabra...</div>
    </div>

    <div class="card weather-box">
        <h2>Clima Buenos Aires</h2>
        <a class="weatherwidget-io" href="https://forecast7.com/es/n34d60s58d38/buenos-aires/" data-label_1="BUENOS AIRES" data-theme="pure" data-textcolor="#ffffff" data-days="7">CLIMA</a>
    </div>

    <div class="card">
        <h2>Últimas Noticias</h2>
        <div class="content">
            <ul id="news-list">Cargando noticias...</ul>
        </div>
    </div>

    <div class="card">
        <h2>Cita del Día</h2>
        <div class="content" id="quote-box">Cargando cita...</div>
    </div>

    <script>
        // 1. RELOJ
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-AR');
            document.getElementById('date').textContent = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000); updateClock();

        // 2. DÓLAR (Directo de API)
        async function getDolar() {
            try {
                const res = await fetch('https://dolarapi.com/v1/dolares');
                const data = await res.json();
                const oficial = data.find(d => d.casa === "oficial");
                const blue = data.find(d => d.casa === "blue");
                document.getElementById('dolar-oficial').textContent = `$${oficial.venta}`;
                document.getElementById('dolar-blue').textContent = `$${blue.venta}`;
            } catch (e) { console.error("Error Dólar"); }
        }
        getDolar();

        // 3. NOTICIAS Y PALABRA (Usando un proxy alternativo)
        async function fetchFeeds() {
            // Usamos un servicio de noticias diferente para evitar bloqueos
            const newsUrl = `https://api.rss2json.com/v1/api.json?rss_url=https://www.clarin.com/rss/lo-ultimo/&api_key=00000000000000000000000000000000`; // API Key genérica
            
            try {
                // Noticias
                const resNews = await fetch(newsUrl);
                const dataNews = await resNews.json();
                if(dataNews.items) {
                    document.getElementById('news-list').innerHTML = dataNews.items.slice(0, 5).map(i => 
                        `<li><a href="${i.link}" target="_blank">${i.title}</a></li>`
                    ).join('');
                }

                // Cita/Palabra (Simulado si falla el RSS)
                document.getElementById('word-box').innerHTML = `<b style="color:var(--accent)">Eternidad</b><br>Perpetuidad sin fin.`;
                document.getElementById('quote-box').innerHTML = `<i>"La tecnología es mejor cuando une a la gente."</i>`;
            } catch (e) {
                document.getElementById('news-list').textContent = "Error al conectar con el servidor de noticias.";
            }
        }
        fetchFeeds();

        // 4. CLIMA (Inyección forzada)
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
    </script>
</body>
</html>
