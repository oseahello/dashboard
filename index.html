<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nocturno Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-overlay: rgba(10, 15, 25, 0.88); /* Más oscuro para la noche */
            --card-bg: rgba(30, 41, 59, 0.6); 
            --text-main: #ffffff;
            --accent: #38bdf8;
            --green: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-main);
            /* FONTO ACTUALIZADO: Imágenes de paisajes nocturnos de alta calidad */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 20px; 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .clock { font-size: 3.5rem; font-weight: 700; text-align: center; color: var(--accent); text-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        h2 { font-size: 0.9rem; margin-top: 0; border-bottom: 1px solid var(--accent); padding-bottom: 8px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }

        .dolar-container { display: flex; justify-content: space-around; text-align: center; margin-top: 10px; }
        .dolar-price { font-size: 1.6rem; font-weight: bold; color: var(--green); }

        .content { font-size: 0.95rem; line-height: 1.5; color: rgba(255,255,255,0.9); }
        a { color: var(--accent); text-decoration: none; transition: 0.3s; }
        a:hover { text-shadow: 0 0 8px var(--accent); }
        
        .weather-box { grid-column: span 2; min-height: 250px; }
        
        /* Aseguramos que el widget sea visible */
        #weather-container { min-height: 200px; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <div class="clock" id="clock">00:00:00</div>
        <div id="date" style="text-align: center; font-weight: 300; opacity: 0.8;">Cargando...</div>
    </div>

    <div class="card">
        <h2>Dólar Argentina</h2>
        <div class="dolar-container">
            <div><div style="font-size: 0.7rem; opacity: 0.6;">OFICIAL</div><div class="dolar-price" id="dolar-oficial">...</div></div>
            <div><div style="font-size: 0.7rem; opacity: 0.6;">BLUE</div><div class="dolar-price" id="dolar-blue">...</div></div>
        </div>
    </div>

    <div class="card">
        <h2>Palabra del Día</h2>
        <div class="content">
            <span id="word-today" style="font-size: 1.3rem; color: var(--accent); font-weight: bold;">...</span>
            <p id="word-def"></p>
        </div>
    </div>

    <div class="card weather-box">
        <h2>Pronóstico Extendido (7 Días)</h2>
        <div id="weather-container">
            <a class="weatherwidget-io" href="https://forecast7.com/es/n34d60s58d38/buenos-aires/" data-label_1="BUENOS AIRES" data-theme="pure" data-textcolor="#ffffff" data-days="7">CLIMA</a>
        </div>
    </div>

    <div class="card">
        <h2>Cita & Libro</h2>
        <div id="book-content" class="content">Cargando...</div>
    </div>

    <div class="card">
        <h2>Últimas Noticias</h2>
        <div id="news-container" class="content" style="max-height: 150px; overflow-y: auto;">...</div>
    </div>

    <script>
        // Reloj
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-AR');
            document.getElementById('date').textContent = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000); updateClock();

        // Dólar con manejo de errores
        async function fetchDolar() {
            try {
                const resO = await fetch('https://dolarapi.com/v1/dolares/oficial');
                const resB = await fetch('https://dolarapi.com/v1/dolares/blue');
                const o = await resO.json(); const b = await resB.json();
                document.getElementById('dolar-oficial').textContent = `$${o.venta}`;
                document.getElementById('dolar-blue').textContent = `$${b.venta}`;
            } catch (e) { document.getElementById('dolar-blue').textContent = "Error"; }
        }
        fetchDolar();

        // Palabra y Noticias usando un proxy seguro
        async function fetchData() {
            try {
                const wordRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.wordreference.com/wotd/wotdes.xml`);
                const wordData = await wordRes.json();
                document.getElementById('word-today').textContent = wordData.items[0].title;
                document.getElementById('word-def').innerHTML = wordData.items[0].description.split('<br>')[0];

                const newsRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419`);
                const newsData = await newsRes.json();
                document.getElementById('news-container').innerHTML = newsData.items.slice(0, 5).map(i => `<div style="margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:4px;"><a href="${i.link}" target="_blank">${i.title}</a></div>`).join('');
            } catch (e) { console.log("Error en feeds"); }
        }
        fetchData();

        async function fetchBooks() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.goodreads.com/quotes_of_the_day/rss`);
                const data = await res.json();
                document.getElementById('book-content').innerHTML = `<i style="color:var(--accent)">"${data.items[0].title}"</i><br><p>${data.items[0].description}</p>`;
            } catch (e) { }
        }
        fetchBooks();

        // RE-INICIALIZAR CLIMA
        function loadWeather() {
            const script = document.createElement('script');
            script.id = 'weatherwidget-io-js';
            script.src = 'https://weatherwidget.io/js/widget.min.js';
            document.body.appendChild(script);
        }
        setTimeout(loadWeather, 500); // Pequeño delay para asegurar que el DOM esté listo
    </script>
</body>
</html>
