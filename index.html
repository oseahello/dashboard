<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeDash Personal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.75); 
            --accent: #38bdf8; /* Azul Cian */
            --text-primary: #ffffff; /* Blanco puro para mejor lectura */
            --text-secondary: #cbd5e1; /* Gris claro azulado */
            --border-color: rgba(56, 189, 248, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-primary);
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        /* Sección Reloj */
        .clock-section { text-align: center; }
        .clock { font-size: 4rem; font-weight: 600; color: var(--text-primary); margin: 0; line-height: 1; }
        .date { color: var(--accent); text-transform: uppercase; font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; margin-bottom: 5px; }

        h2 { 
            font-size: 0.85rem; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
        }

        .dolar-val { font-size: 1.8rem; font-weight: 600; color: #fff; }
        .dolar-label { font-size: 0.75rem; color: var(--text-secondary); }

        .weather-container { grid-column: span 2; min-height: 150px; }
        
        .news-link { 
            display: block; 
            color: var(--text-primary); 
            text-decoration: none; 
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .news-link:hover { background: rgba(56, 189, 248, 0.2); transform: translateX(5px); }

        @media (max-width: 768px) {
            .weather-container { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="card clock-section">
        <div class="date" id="date">--</div>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <div class="card">
        <h2>Mercado Financiero</h2>
        <div style="display: flex; justify-content: space-between;">
            <div>
                <div class="dolar-label">BLUE VENTA</div>
                <div class="dolar-val" id="blue-val">...</div>
            </div>
            <div style="text-align: right;">
                <div class="dolar-label">OFICIAL</div>
                <div class="dolar-val" id="oficial-val">...</div>
            </div>
        </div>
    </div>

    <div class="card weather-container">
        <h2>Clima Actual</h2>
        <a class="weatherwidget-io" href="https://forecast7.com/es/n34d61s58d38/buenos-aires/" data-label_1="BUENOS AIRES" data-theme="pure" data-textcolor="#ffffff" data-accent="#38bdf8" >CLIMA</a>
    </div>

    <div class="card">
        <h2>Titulares</h2>
        <div id="news-container">Cargando noticias...</div>
    </div>

    <script>
        // Reloj eXtremo: Se asegura de cargar inmediatamente y actualizar
        function updateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', day: '2-digit', month: 'long' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-AR', optionsTime);
            document.getElementById('date').textContent = now.toLocaleDateString('es-AR', optionsDate);
        }
        
        setInterval(updateTime, 1000);
        updateTime();

        // Finanzas
        async function fetchFinance() {
            try {
                const res = await fetch('https://dolarapi.com/v1/dolares');
                const data = await res.json();
                document.getElementById('blue-val').textContent = `$${data.find(d => d.casa === "blue").venta}`;
                document.getElementById('oficial-val').textContent = `$${data.find(d => d.casa === "oficial").venta}`;
            } catch (e) { console.error("Error Finanzas"); }
        }
        fetchFinance();
        setInterval(fetchFinance, 300000); // Cada 5 min

        // Noticias
        async function fetchNews() {
            try {
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.clarin.com/rss/lo-ultimo/');
                const data = await res.json();
                document.getElementById('news-container').innerHTML = data.items.slice(0, 4).map(item => 
                    `<a href="${item.link}" class="news-link" target="_blank">${item.title}</a>`
                ).join('');
            } catch (e) { document.getElementById('news-container').textContent = "Error al cargar noticias"; }
        }
        fetchNews();

        // Inicialización del Widget de Clima
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
    </script>
</body>
</html>
